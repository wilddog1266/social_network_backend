spring.application.name=social-graph-service
server.port=8084

spring.datasource.url=jdbc:postgresql://localhost:5432/social_network
spring.datasource.username=user
spring.datasource.password=pass

spring.jpa.properties.hibernate.default_schema=social
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

app.jwt.secret=${APP_JWT_SECRET}
app.jwt.issuer=auth-service

spring.flyway.enabled=true
spring.flyway.schemas=social
spring.flyway.default-schema=social
spring.flyway.table=flyway_social_history

spring.kafka.bootstrap-servers=kafka:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
app.kafka.topic.user-followed=user-followed